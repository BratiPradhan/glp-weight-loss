services:
  postgres:
    image: postgres:15-alpine
    container_name: glp1-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: glp1
      POSTGRES_PASSWORD: glp1_dev_password
      POSTGRES_DB: glp-weight-loss
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glp1 -d glp-weight-loss"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: