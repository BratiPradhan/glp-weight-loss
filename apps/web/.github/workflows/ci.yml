name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: glp1
          POSTGRES_PASSWORD: glp1_dev_password
          POSTGRES_DB: glp-weight-loss
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U glp1 -d glp-weight-loss"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://glp1:glp1_dev_password@localhost:5432/glp-weight-loss?schema=public
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      CORS_ORIGIN: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @glp1/shared build

      - name: Test shared
        run: pnpm --filter @glp1/shared test

      - name: Test api
        run: pnpm --filter @glp1/api test

      - name: Prisma generate
        run: pnpm --filter @glp1/api prisma generate

      - name: Prisma migrate
        run: pnpm --filter @glp1/api exec prisma migrate deploy

      - name: Install Playwright browsers
        run: pnpm --filter @glp1/web exec playwright install --with-deps chromium

      - name: Start api
        run: pnpm --filter @glp1/api dev &
        env:
          API_PORT: 3001

      - name: Start web
        run: pnpm --filter @glp1/web dev &

      - name: Wait for servers
        run: |
          npx wait-on http://localhost:3001/api/health http://localhost:3000 --timeout 60000

      - name: Run Playwright tests
        run: pnpm --filter @glp1/web exec playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
